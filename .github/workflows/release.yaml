name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA=$(curl -sL "https://github.com/skorphil/nodesize/archive/refs/tags/v${VERSION}.tar.gz" | shasum -a 256 | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/skorphil/homebrew-tap.git
          cd homebrew-tap

          sed -i "s|archive/refs/tags/v.*\.tar\.gz|archive/refs/tags/v${VERSION}.tar.gz|" Formula/nodesize.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Formula/nodesize.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nodesize.rb
          git commit -m "chore: bump nodesize to v${VERSION}"
          git push
